[build]
  # Build validates the entire monorepo but only publishes the landing page
  # API deployment is MANUAL via local `wrangler deploy` (Rule 6 — no auto-deploy)
  command = "pnpm build && echo 'Build complete'"
  publish = "apps/landing"
  # Only rebuild when landing page changes
  ignore = "git diff --quiet $COMMIT_PARENT $COMMIT -- apps/landing && exit 1 || exit 0"

[build.environment]
  NODE_ENV = "production"
  PNPM_FLAGS = "--frozen-lockfile"

# Disable any automatic deployment
[context.production]
  command = "pnpm build && echo 'Landing page built successfully. API deployment must be done manually.'"
  publish = "apps/landing"
