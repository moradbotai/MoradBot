name = "moradbot-api"
main = "src/index.ts"
compatibility_date = "2024-02-17"
node_compat = true

[vars]
ENVIRONMENT = "development"

# Secrets must be set using: wrangler secret put <KEY>
# Required secrets:
#   - SUPABASE_URL
#   - SUPABASE_ANON_KEY
#   - SUPABASE_SERVICE_ROLE_KEY
#   - SALLA_CLIENT_ID
#   - SALLA_CLIENT_SECRET
#   - SALLA_REDIRECT_URI

# Production environment
[env.production]
vars = { ENVIRONMENT = "production" }
